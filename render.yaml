services:
  # Backend Service (Node.js + Python AI)
  - type: web
    name: actory-backend
    env: node
    plan: free
    rootDir: actory-spotlight-backend
    buildCommand: pip install -r ai/requirements.txt && npm install
    startCommand: npm start
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: actory-mongodb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_ORIGIN
        value: https://actory-1ci4.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_FROM
        value: noreply@actory.com
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

  # Frontend Service (React/Vite Static Site)
  - type: web
    name: actory-frontend
    env: static
    plan: free
    rootDir: actory-spotlight-ui
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://actory-backend.onrender.com
      - key: VITE_SOCKET_URL
        value: https://actory-backend.onrender.com

databases:
  - name: actory-mongodb
    plan: free
    databaseName: actory-spotlight
